<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet" />
<style>
  :root{ --grad:linear-gradient(90deg,#e64a3b,#e8842b,#e8c531,#7bc043,#2fb3a8,#3a8dde,#7a5cd0,#c44fa8); }
  *{box-sizing:border-box;margin:0}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{background:radial-gradient(900px 600px at 80% -20%,#1a2334 0%,#0a0b10 60%);
    color:#eef0f6;font-family:'Space Grotesk',system-ui,sans-serif;position:relative}
  .strip{height:8px;background:var(--grad)}
  .wrap{display:flex;align-items:center;height:622px;padding:0 70px;gap:40px}
  .left{flex:1 1 56%}
  .right{flex:1 1 44%;display:flex;justify-content:center;align-items:center}
  .lockup{font-weight:300;text-transform:uppercase;letter-spacing:.18em;font-size:22px;margin-bottom:34px}
  .lockup .meter{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  h1{font-family:"Iowan Old Style",Palatino,Georgia,serif;font-weight:600;font-size:68px;line-height:1.04;letter-spacing:-.01em}
  h1 .g{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .tag{margin-top:26px;font-size:25px;line-height:1.4;color:#cfd3e2;font-weight:300;max-width:30ch}
  .foot{position:absolute;left:70px;bottom:40px;font-size:19px;color:#8b93a7;font-weight:300;letter-spacing:.04em}
  .foot b{color:#eef0f6;font-weight:400}
  svg{width:430px;height:430px}
</style>
</head><body>
<div class="strip"></div>
<div class="wrap">
  <div class="left">
    <div class="lockup">Brand <span class="meter">Meter</span></div>
    <h1>Read the perception<br>you don't <span class="g">control</span></h1>
    <p class="tag">How different audiences actually perceive a brand — cohort by cohort, across eight dimensions.</p>
  </div>
  <div class="right"><div id="radar"></div></div>
</div>
<div class="foot"><b>meter.spectralbranding.com</b> &nbsp;·&nbsp; the open Brand Spectrometer</div>

<script>
const DIMS=8;
const COH=[
  {v:[2.3,3.1,3.5,5.2,2.9,3.0,2.4,4.0],c:"#e8842b"},
  {v:[3.5,4.6,5.4,3.2,5.8,3.9,5.7,3.9],c:"#e8c531"},
  {v:[6.5,7.0,5.5,8.0,6.0,7.5,5.0,6.5],c:"#3a8dde"},
  {v:[7.8,8.2,6.0,7.5,8.5,9.0,8.0,7.7],c:"#2fb3a8"},
  {v:[8.4,7.8,5.6,9.0,8.1,9.2,7.2,8.6],c:"#1f9d57"}
];
const NS="http://www.w3.org/2000/svg",E=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
const W=430,cx=215,cy=215,R=170,max=10,n=DIMS;
const ang=i=>(-Math.PI/2)+i*2*Math.PI/n, pt=(i,r)=>[cx+Math.cos(ang(i))*r,cy+Math.sin(ang(i))*r];
const s=E("svg",{viewBox:`0 0 ${W} ${W}`});
for(let g=2;g<=10;g+=2){const rr=R*g/max;
  s.appendChild(E("polygon",{points:Array.from({length:n},(_,i)=>pt(i,rr).map(x=>x.toFixed(1)).join(",")).join(" "),
    fill:"none",stroke:"#222a38","stroke-width":1}));}
for(let i=0;i<n;i++){const[ex,ey]=pt(i,R);s.appendChild(E("line",{x1:cx,y1:cy,x2:ex,y2:ey,stroke:"#222a38","stroke-width":1}));}
COH.forEach(co=>{const pts=co.v.map((v,i)=>pt(i,R*v/max).map(x=>x.toFixed(1)).join(",")).join(" ");
  s.appendChild(E("polygon",{points:pts,fill:co.c,"fill-opacity":0.16,stroke:co.c,"stroke-width":2.2,"stroke-opacity":0.95}));});
document.getElementById("radar").appendChild(s);
</script>
</body></html>
