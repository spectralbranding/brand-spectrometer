  \ being compared to both traditional Ferrari models and emerging domestic EVs. The\
  \ juxtaposition of Ferrari's legacy with the modern, minimalist design of the Luce\
  \ creates a complex narrative, where the brand's future direction is being hotly\
  \ debated. This internal tension within the cohort underscores the importance of\
