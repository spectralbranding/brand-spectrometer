inferred_tier_5_process_couplings:
- A dedicated EV platform underpins the Luce, separating it from Ferrari’s mid‑engine
  V8/V12 line, which observably protects the combustion cars’ manufacturing IP and
  assembly line logic.
- The four‑motor architecture and high‑voltage battery pack imply a supply‑chain shift
  toward e‑axle suppliers and high‑energy‑density cell partners (possibly CATL or
  Panasonic‑derived), moving beyond Ferrari’s historic engine‑centric production network.
- Design‑process coupling is visible through Jony Ive’s involvement, suggesting a
  design‑studio workflow that may blend Apple‑style CMF (color, material, finish)
  rigor with Maranello’s coachbuilding tradition.
- The emphasis on aerodynamic efficiency (cited as a reason for the rounded form)
  indicates that wind‑tunnel optimization and software‑driven surfacing played a larger
  role in the design‑freeze decision than in previous Ferrari projects.
