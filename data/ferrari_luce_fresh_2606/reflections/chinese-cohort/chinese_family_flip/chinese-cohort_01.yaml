  \ unique local lens: where a European luxury marque ought to deliver a category‑defining\
  \ EV, the Chinese audience perceives a design that borrows clumsily from mass‑market\
  \ Japanese and British‑Irish nameplates and cues, and a naming choice that reads\
  \ as legally opportunistic rather than culturally assured. The ridicule cascade\
