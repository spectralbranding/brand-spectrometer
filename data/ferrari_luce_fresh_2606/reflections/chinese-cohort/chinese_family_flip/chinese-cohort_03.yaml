  that may point to a family of EVs, affecting how the corporate entity manages R&D
  capitalization and model-line investment.
inferred_tier_5_process_couplings:
- A dedicated EV platform (likely named “Threads”) that underpins Luce and potentially
  multiple variants, inferred from the article’s enumeration of “Multipla Luce, Threads”
  as related nameplates.
- Design process predominantly executed by an external firm (LoveFrom) rather than
  the internal Centro Stile, a process coupling that changes the rhythm of Ferrari’s
  product development and is visible through the hiring of Jony Ive and Marc Newson.
- Weight management and performance calibration appear benchmarked directly against
  the Xiaomi SU7 Max, suggesting that Ferrari’s engineering targets were set with
  Chinese domestic EVs as reference points — a process coupling that signals integrated
  cross-border competitive intelligence.
