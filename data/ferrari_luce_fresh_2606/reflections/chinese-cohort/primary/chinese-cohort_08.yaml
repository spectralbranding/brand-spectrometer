  \n### Inferred Tier-3 and Tier-5 Signals\n\n**inferred_tier_3_signals:**\n*   **IP\
  \ / Legal-Entity:** Ferrari’s quiet acquisition of the global \"Luce\" trademark\
  \ following the expiration of Mazda’s historical registration, which inadvertently\
  \ invited direct legacy comparisons.\n*   **Investor-Confidence:** A short-term\
