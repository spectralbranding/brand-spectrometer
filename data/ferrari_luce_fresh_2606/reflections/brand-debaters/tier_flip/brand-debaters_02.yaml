  \ Signals (Legal, Corporate, Investor)\n\n- **Equity Confidence**: The $1B revenue\
  \ threshold at boutique scale (1,670 units) signals that Ferrari's parent holding\
  \ or investor base has sufficient equity confidence to absorb rebranding risk *without\
  \ requiring blockbuster adoption*. This suggests board-level acceptance of a narrow\
