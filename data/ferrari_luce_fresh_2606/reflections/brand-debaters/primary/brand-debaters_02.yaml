  \ of supply chain, battery sourcing, or\n    platform sharing — observer-side Tier-5\
  \ inference is therefore weakly\n    supported and CI-bearing.\n```\n\n## Internal\
  \ Divergence\n\nThe brand-debaters cohort is internally bimodal between an identity-preservationist\
  \ pole (reading the Luce as betrayal, anchored by the Jaguar analogy) and a commercial-pragmatist\
  \ pole (reading it as a defensible bet at a modest unit threshold). This bimodality\
  \ is the structural reason the CIs above are wide — particularly on `heritage_continuity`\
  \ (1.0–5.5), `stewardship_signal` (1.5–6.0), and `aesthetic_coherence` (2.0–7.5),\
  \ where the two poles produce nearly opposite point estimates and the artifact sample\
