rendering: "# Tier-4 Implicit-Spec Inference: Ferrari Luce\n## Non-Italian Global\
  \ Press Cohort (CNN / Fortune / TechCrunch / Autocar / InsideEVs)\n**Observation\
  \ Period:** 2026-05-30 to 2026-06-20\n\n---\n\n## Analytical Narrative\n\nAs visible\
