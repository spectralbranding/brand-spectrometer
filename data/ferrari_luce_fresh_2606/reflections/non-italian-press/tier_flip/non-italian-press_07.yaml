  \ set to begin in Q4 2026\" and the five-seat configuration, the implicit spec appears\
  \ to encode: \"The Luce is a limited-production flagship positioned to establish\
  \ electric-luxury market authority for Ferrari, not to compete in volume EV segments.\"\
  \ The non-Italian press cohort reads this as a *beachhead strategy*—prove Ferrari\
  \ can execute electric vehicles at the top of the market, then cascade downmarket.\n\
  \n**Continuity Signal and Portfolio Legitimacy**\n\nEnrico Galliera's statement\
  \ that \"Ferrari will continue to offer petrol and hybrid cars along with its all-[electric]\"\
  \ vehicles appears in the sample as truncated, but its implicit specification is\
  \ clear: the Luce does not represent a wholesale brand transition. This is a *portfolio-diversification\
