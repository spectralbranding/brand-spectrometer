  \ entry and investor legibility, but whose brand-equity foundation depends on sustained\
  \ irrationality. The global press cohort appears to be reading this tension as the\
  \ defining implicit spec of the Luce: **a rational vehicle wearing the costume of\
  \ an irrational brand**, and the market-story framing is whether that contradiction\
