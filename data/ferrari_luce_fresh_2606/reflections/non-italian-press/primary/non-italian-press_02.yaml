  \ spec concerns audience selection. The artifact foregrounds TechCrunch’s question\
  \ of “who the car is actually for” and notes that more than 80% of the 14,000 people\
  \ who bought a Ferrari the prior year already owned one [non-italian-press_02].\
  \ From this vantage, the Luce is plausibly read as specified first for incumbent\
  \ Ferrari collectors or multi-car owners, while also being allowed to attract “brand-new\
  \ customers” according to the CEO claim quoted in the article [non-italian-press_02].\
  \ That produces an implicit segment design: the product appears built to be controversial\
  \ enough to generate mass attention but expensive and scarce enough to remain primarily\
