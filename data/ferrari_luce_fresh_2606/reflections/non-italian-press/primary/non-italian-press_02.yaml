  \ luxury pricing. The artifact reports a price near $650,000 / €550,000, four electric\
  \ motors, more than 1,000 horsepower, a 122 kWh battery, 0–100 km/h in 2.5 seconds,\
  \ and a top speed above 310 km/h [non-italian-press_02]. For general-news and business-facing\
  \ outlets, those numbers make the Luce legible as a “serious hardware” story rather\
