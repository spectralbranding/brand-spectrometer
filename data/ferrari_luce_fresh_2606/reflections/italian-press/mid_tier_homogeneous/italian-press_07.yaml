  \ Inferred Tier-3 Signals\n\n*Observable to this cohort from artifact italian-press_07\
  \ and the broader Italian-language press context, inferred via structural decomposition:*\n\
  \n- **Brand-IP continuity risk signal**: The \"tradimento dell'identità\" framing\
  \ implies that this cohort is monitoring Ferrari's trademark identity (the Cavallino\
