  \ €550,000 EV that is already outperformed on raw metrics by existing products,\
  \ and faces a future competitive entrant with superior specifications at lower cost,\
  \ raises questions about the durability of the premium-positioning specification.\n\
  \n**National-Heritage Tension**\n\nThe most analytically interesting implicit-spec\
  \ signal for this specific cohort is the tension between the national-heritage register\
