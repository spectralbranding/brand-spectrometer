  \ read. Owners are, in this artifact pool, also framing themselves as stewardship\
  \ custodians, not merely consumers.\n\n**Cohort Composition Caveat.** The vocal-owner\
  \ subset is structurally over-represented in this artifact pool. Long-term quiet\
  \ collectors—those who may read the Luce as a defensible portfolio-diversification\
  \ or clientele-expansion move—are largely invisible in the sampled artifacts. This\
  \ asymmetry widens CIs on dimensions where silent-majority divergence is plausible.\n\
