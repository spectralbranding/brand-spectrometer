  \ models (California, FF, GTC4Lusso, Portofino) to subsidize collector access to\
  \ limited allocations. The $640,000 price point, combined with the article's assertion\
  \ that it will likely depreciate heavily, maps onto a well-understood pattern this\
  \ cohort has navigated before. The implicit spec, as inferred, signals: *this is\
  \ a toll to pay, not a trophy to display.*\n\n**2. Depreciation Risk as Known Structural\
  \ Feature**\n\nVeteran owners in this cohort are not surprised by anticipated depreciation.\
  \ The artifact characterizes these regular production models as historically depreciating\
  \ \"the minute they leave the showroom.\" For multi-Ferrari collectors who have\
  \ absorbed depreciation on GTC4Lussos to maintain relationships, the Luce represents\
  \ a larger toll—$640,000, with EV novelty risk layered atop the usual GT-model softness.\
  \ The cohort's implicit-spec reading therefore bifurcates: those with deep enough\
  \ portfolios to absorb the depreciation as a cost-of-relationship will likely comply;\
  \ those at the margin of collector status may exit the system. This bifurcation\
  \ is a key driver of CI width throughout the scoring below.\n\n**3. Aesthetic and\
  \ Category Legitimacy Questions**\n\nThe artifact describes the Luce as \"visually\
