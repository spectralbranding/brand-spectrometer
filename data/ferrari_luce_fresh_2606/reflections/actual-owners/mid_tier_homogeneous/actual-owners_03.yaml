  \ Ferrari's visual grammar—mid-engine haunches, Pininfarina-adjacent lineage, combustion-era\
  \ proportions—the implicit spec inference is that Ferrari has departed from observable\
  \ aesthetic continuity markers. The cohort's reconstruction of the Tier-4 spec likely\
  \ codes the design as a voluntary break from form-vocabulary loyalty, not an evolutionary\
  \ step.\n\n**Allocation-as-Coercion Reading.** The excerpt's most structurally significant\
  \ signal, as visible to this cohort, is the reported allocation mechanic: taking\
  \ the Luce is presented as a condition for maintaining or advancing one's position\
  \ among top clients. Bloomberg-sourced owner quotes—carried attributively in actual-owners_03—describe\
  \ Ferrari as making \"clear to him that taking the car mattered if he wanted to\
  \ keep his place among top clients.\" This cohort, uniquely positioned because they\
