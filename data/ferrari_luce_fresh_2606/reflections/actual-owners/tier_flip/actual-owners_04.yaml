  \ implicit compact between brand stewardship and client respect. Ferrari has historically\
  \ managed scarcity through *curation*; this launch is inferred to be the first instance\
  \ where curation has been weaponized transparently against existing clientele.\n\
  \nFor collectors specifically, the Luce's implicit spec introduces an unprecedented\
  \ valuation uncertainty. Prior Ferrari models, even poorly reviewed ones, have traded\
