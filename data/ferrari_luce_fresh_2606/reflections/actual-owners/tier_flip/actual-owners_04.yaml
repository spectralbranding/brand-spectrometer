  \ car becomes collateral in a debt-like arrangement with Maranello's allocation\
  \ system. Ownership is conditional, not terminal. The cohort observes that the brand\
  \ has effectively securitized access to future desirable products against present\
  \ acceptance of an undesired one.\n\nThe financial and narrative context amplifies\
  \ this reading. The artifact notes \"universally panned\" reception by journalists\
