  \ stock price.\" To actual owners—who have invested millions and built curated ownership\
  \ histories—this signals institutional desperation. The Luce did not sell on its\
  \ merits; it was rejected by the market. Rather than iterate or withdraw, Ferrari\
  \ is inferred to be weaponizing its most valuable intangible asset: allocation power\
  \ and the psychological weight of brand membership.\n\nThe allocation system itself,\
  \ as described through Max Girardo's analogy (\"the more you buy, the more you are\
  \ treated as an important client\"), reveals the cohort's understanding of the implicit\
  \ specification: the Luce is not a car—it is a *tiering token*. Owners who comply\
  \ signal malleable brand loyalty and capital availability; non-compliance signals\
  \ departure. The brand's implicit message, as decoded by this cohort, is that membership\
  \ is no longer based on taste alignment or custodianship but on demonstrated obedience\
  \ to corporate capital deployment priorities.\n\nThis cohort's reading also incorporates\
  \ the specific conditions Ferrari imposes for allocation eligibility: spending millions\
  \ on prior purchases, attendance at factory events, and contractual restrictions\
  \ on resale. These requirements are inferred to function as sunk-cost locks, making\
  \ exit costlier than compliance. The Luce, in this reading, is an extraction mechanism.\
  \ Its high price ($640,000) and poor market reception make it simultaneously a wealth\
  \ transfer (upward to Ferrari S.p.A.) and a loyalty test (downward to the owner\
