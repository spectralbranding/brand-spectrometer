  \ participants to purchase it in order to maintain standing and advance to hypercars.\
  \ One quoted buyer reports direct factory signaling that \"taking the car mattered\"\
  \ for preserving top-client status; another notes Ferrari is signaling that \"access\
  \ to a future one-off model may first depend on buying the Luce or cheaper entry-level\
  \ models.\"\n\nThis is read by the cohort as a fundamental reversal of Ferrari's\
  \ historical allocation grammar. Traditionally, the narrative has been that access\
  \ is earned through multi-decade ownership loyalty and demonstrated passion. The\
  \ Luce, by this cohort's inference, converts that relationship into a *transactional\
  \ gating mechanism*: the implicit spec becomes \"a car Ferrari needs to move inventory\
  \ on, packaged as an obligation to retain privilege.\"\n\n**Cohort Emotional and\
  \ Strategic Posture**\n\nThe tone in artifacts is notably cool. Girardo's restaurant\
