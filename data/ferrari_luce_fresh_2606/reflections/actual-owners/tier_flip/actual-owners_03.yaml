  \ that Ferrari is observing which buyers will absorb an unpopular vehicle to protect\
  \ their position—a data point for future allocation decisions.\n\n**Implied Tier-4\
  \ Spec Components (as read by owners)**\n\n1. **Brand-loyalty signal function**:\
  \ The Luce is implicitly specified as a binary gate: acceptance = continued allocation\
