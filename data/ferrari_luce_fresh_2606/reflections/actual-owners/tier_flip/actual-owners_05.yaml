  \ Inferred Tier-3 Signals (Legal / Stewardship / Investor Confidence)\n\n- **Allocation\
  \ opacity as legal shield**: Ferrari's unwritten allocation rules insulate the company\
  \ from antitrust or consumer-protection liability. The spec treats allocation as\
  \ a *relationship* matter, not a contractual obligation, minimizing legal exposure\
  \ to \"tied selling\" claims.\n- **Investor confidence in pricing power**: The willingness\
  \ to introduce a controversial, depreciation-prone vehicle as an allocation gate\
  \ signals that Ferrari leadership believes owner loyalty is inelastic. This is a\
  \ signal to investors that the brand can extract margin from captive customers regardless\
  \ of product merit.\n- **Corporate governance risk**: The Luce spec suggests management\
  \ confidence that it can override product-quality signals without owner revolt.\
  \ This is a *governance bet* that shareholders will later judge as either shrewd\
  \ (if depreciation is absorbed) or reckless (if it triggers brand damage).\n- **Sustainability\
  \ narrative dependency**: The EV framing may signal stewardship toward regulatory\
  \ compliance and ESG optics, even if the Luce's *actual* environmental benefit is\
  \ unclear. This allows Ferrari to present the car to institutional investors as\
  \ a climate-responsible move.\n\n---\n\n## Inferred Tier-5 Process Couplings (Production\
  \ / Supply-Chain / Design / Platform)\n\n- **EV platform compromise**: The four-door\
  \ EV architecture appears to have been chosen for *practical efficiency* (battery\
  \ volume, range, manufacturing cost) rather than design coherence. Owners perceive\
  \ the result as \"unusual-looking,\" suggesting design was subordinated to platform\
  \ economics.\n- **Depreciation-as-feature**: The spec tacitly assumes rapid depreciation.\
  \ This implies Ferrari's supply-chain and production planning are *not* geared toward\
  \ Luce residual-value protection. The vehicle will be produced in sufficient volume\
  \ that used examples will be abundant, undermining collectibility.\n- **Allocation\
  \ decoupling from manufacturing**: The Luce spec suggests that allocation decisions\
  \ are *upstream* of design and production. Ferrari likely designed the vehicle *to\
  \ be difficult to sell*, then used its allocation power to move inventory—the reverse\
  \ of conventional product-market logic.\n- **Platform reuse potential**: The EV\
  \ platform may be designed for future re-deployment (other four-door EVs, SUVs),\
  \ but owners perceive the Luce itself as a one-off coercion tool, not a foundation\
  \ for a new model line. This signals that Ferrari is not committed to EV innovation,\
  \ only to EV compliance.\n\n---\n\n## Internal Cohort Divergence\n\nThe \"Actual\
  \ Ferrari Owners\" cohort is internally **highly stratified** by tolerance for coercion\
  \ and financial sensitivity to depreciation. The wide confidence intervals (e.g.,\
  \ Dimension 6: 2.3–5.3; Dimension 8: 1.2–4.0) reflect this split:\n\n- **Wealthy\
  \ ($10B+ net worth) long-term multi-car collectors** perceive the Luce as a minor\
  \ friction cost, easily absorbed. They may accept the test as a price of admission.\n\
  - **Mid-tier collectors ($100M–$1B) with tighter allocation access** view the Luce\
  \ as a threat to future access if declined, creating active resentment. This cohort\
  \ is more vocal in forums.\n- **Recent or aspirational owners** with smaller collections\
  \ may use Luce acceptance as a signal of seriousness to Maranello, reducing their\
  \ resistance.\n\nThe artifacts over-represent the **vocal, resentful middle tier**\
  \ (forum voices, press quotes) while under-representing quiet acceptance by the\
  \ ultra-wealthy and silent discontent among those excluded from allocation entirely.\
  \ This sampling bias inflates the perception of illegitimacy, but does not invalidate\
  \ the core finding: the cohort perceives the Luce spec as a *test of obedience*,\
  \ not a vehicle offering."
