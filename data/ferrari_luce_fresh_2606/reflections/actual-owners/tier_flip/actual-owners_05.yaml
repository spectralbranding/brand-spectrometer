inferred_tier_3_signals:
- 'Allocation opacity as legal shield: Ferrari''s unwritten allocation rules insulate
  the company from antitrust or consumer-protection liability. The spec treats allocation
  as a relationship matter, not a contractual obligation, minimizing legal exposure
  to "tied selling" claims.'
- 'Investor confidence in pricing power: The willingness to introduce a controversial,
  depreciation-prone vehicle as an allocation gate signals that Ferrari leadership
  believes owner loyalty is inelastic. This is a signal to investors that the brand
  can extract margin from captive customers regardless of product merit.'
- 'Corporate governance risk: The Luce spec suggests management confidence that it
  can override product-quality signals without owner revolt. This is a governance
  bet that shareholders will later judge as either shrewd, if depreciation is absorbed,
  or reckless, if it triggers brand damage.'
- 'Sustainability narrative dependency: The EV framing may signal stewardship toward
  regulatory compliance and ESG optics, even if the Luce''s actual environmental benefit
  is unclear. This allows Ferrari to present the car to institutional investors as
  a climate-responsible move.'
