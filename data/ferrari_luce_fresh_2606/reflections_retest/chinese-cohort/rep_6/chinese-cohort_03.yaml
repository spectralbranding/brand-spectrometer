  \n```\n\n**inferred_tier_3_signals**\n- Observable IP and design partnerships with\
  \ LoveFrom (Jony Ive) and Marc Newson, indicating a corporate strategy to import\
  \ external tech-luxury credibility.\n- Public dissent from former chairman Luca\
  \ di Montezemolo, signaling potential board-level or legacy-stakeholder friction\
  \ regarding the EV transition and design direction.\n- A 550,000 EUR pricing strategy\
  \ that reflects corporate confidence in the brand's pricing elasticity, even when\
  \ diverging from traditional design language.\n\n**inferred_tier_5_process_couplings**\n\
  - Procurement and integration of a high-density 122 kWh battery pack engineered\
  \ to manage the thermal and physical demands of a 2.2-ton, 5-motor hyper-GT.\n-\
  \ Bespoke supply-chain integration for the kinetic \"180-degree turning\" HMI hardware,\
  \ requiring specialized manufacturing processes distinct from standard automotive\
  \ tier suppliers.\n- A complex 5-motor powertrain assembly process, implying a highly\
  \ specialized production line dedicated to the new EV architecture rather than a\
  \ shared platform approach.\n\nThe cohort exhibits significant internal divergence,\
  \ particularly regarding the vehicle's design and heritage specifications, which\
  \ is quantified by the wider 95% confidence intervals in the Exterior Design (4.5–7.5)\
  \ and Heritage & Identity (3.5–6.5) dimensions. While one segment of the Chinese\
  \ auto media evaluates the Luce strictly through a pragmatic, tech-forward lens—finding\
  \ its 530 km range and 2.2-ton mass merely adequate when compared to domestic EVs\
  \ like the Xiaomi SU7 Max—another segment focuses on the luxury and industrial design\
  \ narrative, praising the LoveFrom collaboration. This split is exacerbated by the\
