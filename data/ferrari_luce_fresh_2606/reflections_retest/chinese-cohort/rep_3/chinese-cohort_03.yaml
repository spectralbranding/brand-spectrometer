  \ Multi-motor powertrain layout (inferred from the 1050 hp output and EV architecture)\
  \ requiring novel thermal management and torque-vectoring software integration pipelines.\n\
  \nThe internal divergence within the Chinese-language auto media cohort is directly\
  \ quantified in the wider confidence intervals of the `heritage_continuity` (CI:\
  \ 2.0–5.5) and `user_experience` (CI: 4.5–7.5) dimensions. Tech-centric platforms\
  \ and operators tend to focus heavily on the raw hardware specifications, comparing\
  \ the 2.2-ton weight and 530 km range directly to domestic benchmarks like the SU7\
  \ Max, thereby scoring technological integration and efficiency more critically.\
  \ Conversely, traditional luxury and automotive discourse operators focus intensely\
  \ on the LoveFrom design rupture and the Montezemolo quotes, viewing the vehicle\
  \ primarily through the lens of brand equity and aesthetic philosophy. This split\
  \ in analytical framing results in broader CIs where the artifact subset touches\
  \ upon subjective brand values rather than objective hardware metrics."
