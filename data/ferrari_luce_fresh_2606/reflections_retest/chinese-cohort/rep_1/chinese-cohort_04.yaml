  \ coexistence of ICE, hybrid, and EV powertrains, implying a manufacturing and platform\
  \ strategy that accommodates multi-energy architectures rather than a dedicated\
  \ EV-only transition.\n- High-touch sales-process coupling: The requirement for\
  \ physical, in-person vehicle viewing prior to the execution of bank pre-payments,\
  \ indicating a low-volume, high-friction production and delivery pipeline tailored\
  \ to ultra-high-net-worth individuals.\n\nThe Chinese-language auto media cohort\
  \ exhibits significant internal divergence regarding the Luce’s implicit specification,\
