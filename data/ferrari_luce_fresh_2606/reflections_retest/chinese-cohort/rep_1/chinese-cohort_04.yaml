  \ design as a dilution of brand spirit (aligning with Montezemolo’s critique); on\
  \ the other hand, a pragmatic recognition of the brand's commercial agility in capturing\
  \ new wealth, evidenced by the strong pre-order numbers and aggressive pricing architecture.\
  \ The wide CIs reflect a cohort that is fundamentally split between evaluating the\
  \ Luce as a compromised heritage product versus a successful, high-margin demographic\
