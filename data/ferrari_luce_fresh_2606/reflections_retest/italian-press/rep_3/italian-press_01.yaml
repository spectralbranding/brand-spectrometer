  \ implying a\n    separate acoustic-identity workstream not addressed to \"puristi\
  \ del\n    rombo\" (italian-press_01).\n```\n\n## Cohort Internal Divergence\n\n\
  The Italian-language cohort is internally divided along at least two axes, which\
  \ the CIs above attempt to quantify. The financial-press sub-vantage (Milano Finanza,\
  \ presumed Il Sole 24 Ore) treats the selloff as recoverable emotion and pulls scores\
