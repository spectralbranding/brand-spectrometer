  \ to Maranello, signals that within Italian editorial conventions Ferrari is held\
  \ to a different standard than ordinary luxury OEMs — provocation that would be\
  \ congratulated elsewhere is here weighed against the brand's status as patrimony.\n\
  \nThe implicit Tier-4 product spec that the cohort appears to reconstruct from observable\
  \ artifacts has several inferable contours. First, as visible to this cohort, the\
  \ Luce is read as Ferrari's first fully electric road car, framed as a deliberate\
