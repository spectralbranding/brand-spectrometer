rendering: "# Implicit-Spec Inference: Italian-Language Press Cohort on the Ferrari\
  \ Luce\n\n## Analytical Narrative\n\nThe Italian-language press cohort — comprising\
  \ the national dailies (Corriere della Sera), the sports daily that historically\
  \ owns the Ferrari narrative (Gazzetta dello Sport), the financial press (Il Sole\
  \ 24 Ore), the motoring specialists (Quattroruote), and the wire service ANSA —\
  \ approaches any Ferrari launch from a vantage that observer-side reconstruction\
  \ must treat as distinctive: in this cohort's framing, Ferrari is national-heritage\
  \ cultural property co-extensive with the product, not merely a luxury OEM. The\
  \ implicit-spec inference for the Luce launch must therefore be read through that\
  \ doubled lens of industrial pride and patrimonial scrutiny.\n\nThe artifact subset\
  \ available here is genuinely thin. The single excerpt that survives sampling (italian-press_02,\
  \ ANSA, 2026-06-01) is a boilerplate consent/subscription wrapper rather than a\
  \ Luce-substantive news body — it surfaces ANSA's editorial self-description (\"\
  Se è una notizia, è un'ANSA. Raccogliamo, pubblichiamo e distribuiamo informazione\
  \ giornalistica dal 1945\") and its Consentless subscription scaffolding, but does\
  \ not, in the visible excerpt, transmit launch-specific copy. This forces the structural\
  \ decomposition into a higher-uncertainty regime: most dimension scores below carry\
  \ wide 95% CIs because the artifact substrate is, in effect, a single masthead-frame\
  \ rather than a corpus of feature coverage.\n\nWhat can still be inferred, as visible\
  \ to this cohort, is the *register* through which the Luce will plausibly be read.\
  \ The ANSA wrapper signals a wire-service distribution channel that Italian regional\
  \ outlets, financial pages, and motoring desks all syndicate from; this means the\
  \ cohort's first-order Luce read is likely to be a short, fact-dense, attribution-heavy\
  \ launch dispatch rather than the long-form aesthetic essays one would expect from\
  \ anglophone lifestyle press. The implicit Tier-4 product spec, as inferred from\
  \ this observer vantage, is therefore likely to be reconstructed by the cohort along\
  \ the axes that Italian press historically privileges for Ferrari: industrial continuity\
  \ with Maranello, employment and supplier-chain implications for the Modena-Bologna\
  \ corridor, the financial-market read (Il Sole 24 Ore framing share-price and Exor-stewardship\
  \ questions), the engineering thesis (Quattroruote reconstructing the powertrain\
  \ and platform logic), and the heritage-grammar question (Corriere asking whether\
  \ the Luce extends or breaks the canon).\n\nBecause the artifact excerpt available\
  \ does not transmit Luce-specific signals, the cohort-side reconstruction of what\
  \ the Luce *is* must be inferred from absence as much as presence. The ANSA frame's\
  \ neutrality — date-stamped 2026-06-01, three weeks ahead of the sampling window's\
  \ close — suggests the launch is plausibly being covered as a standard industrial-news\
  \ event rather than a national emergency or scandal, which itself is a weak positive\
  \ signal about how the cohort is metabolising the product. No artifact in the visible\
  \ subset registers protest, controversy, or heritage-betrayal framing; equally,\
  \ none registers euphoric endorsement. The default cohort posture inferred from\
  \ this thin substrate is observational-respectful, with financial-press and motoring-press\
  \ sub-cohorts likely to diverge more sharply than the dailies.\n\nThe cohort's internal\
  \ structure matters for the scoring. Il Sole 24 Ore reads any Ferrari launch as\
  \ an Exor-portfolio and FTSE MIB event; Quattroruote reads it as an engineering\
  \ object; Gazzetta reads it through the Scuderia halo; Corriere reads it as cultural\
  \ artefact. These four sub-cohort readings can produce internally consistent but\
  \ mutually divergent implicit-spec inferences from the same launch, and the CIs\
