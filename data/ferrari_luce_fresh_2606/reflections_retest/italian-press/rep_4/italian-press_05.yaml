  \ achieved. First, an **aesthetic-continuity spec**: the cohort registers (attributively,\
  \ via quoted social reaction — \"sembra una Toyota\") that the design language appears,\
  \ to vocal Italian observers, to have decoupled from the visual lineage expected\
  \ of a Maranello product. Whether this perception is fair is outside the artifact's\
  \ scope; what the cohort transmits is that the implicit design brief — inferred\
  \ from observable artifacts — was apparently to produce something legible as Ferrari,\
  \ and that this brief is being publicly contested. Second, an **engineering-distinctiveness\
  \ spec**: the artifact reports that \"innovazioni e brevetti vengono liquidati come\
  \ risibili,\" suggesting that the implicit spec required patent-backed technical\
  \ differentiation sufficient to justify the Ferrari premium in an electric segment\
  \ where that premium is harder to anchor. The cohort treats this as visibly under\
  \ pressure. Third, an **image-insulation spec**: the artifact notes the share price\
