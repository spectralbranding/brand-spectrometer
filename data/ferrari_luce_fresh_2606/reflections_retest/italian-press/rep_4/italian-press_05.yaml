  \ — a reckoning. The headline frame (\"Cadranno teste in Ferrari?\") personalizes\
  \ the launch risk around CEO Benedetto Vigna, which, as visible to this cohort,\
  \ signals an inferred implicit spec where the Luce is treated less as a discrete\
  \ product and more as a referendum on managerial stewardship of a national symbol.\n\
  \nThe product-spec inferences observable through this cohort's lens cluster around\
