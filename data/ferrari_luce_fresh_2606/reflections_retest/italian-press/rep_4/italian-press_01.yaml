  \ press cohort is, on the evidence of the available excerpt, internally divided\
  \ along a financial-press / heritage-press seam rather than along a pro/anti-Luce\
  \ seam. Milano Finanza's own framing already performs this split inside a single\
  \ article — quoting Montezemolo and Calenda as heritage dissent while simultaneously\
  \ narrating the sell-off as emotional and citing sell-side broker rehabilitation.\
  \ This is why our CIs are widest on `heritage_torque` (2.4–5.8), `capital_markets_signal`\
