  \ adversarial read, which makes it a useful but partial signal for reconstructing\
  \ the cohort's implicit-spec inference.\n\nFrom this artifact, the observer-side\
  \ reconstruction of the implicit Tier-4 spec — i.e., what the Luce is being *positioned*\
  \ to be — appears, as visible to this cohort, to cluster around the following inferred\
