rendering: "# Implicit-spec inference — Italian-language press cohort on the Ferrari\
  \ Luce\n\n## Narrative reconstruction\n\nFrom the domestic vantage of the Italian-language\
  \ press — where Maranello is read simultaneously as industrial asset, national-heritage\
  \ cultural property, and stock-listed object of investor scrutiny — the Luce launch\
  \ reads as a deliberately polarizing implicit Tier-4 product specification. The\
  \ Automoto.it long-form interview with Giorgetto Giugiaro (artifact italian-press_07)\
  \ is structurally telling: when a launch is contested enough that the country's\
  \ most-cited automotive designer is convened as a *cultural arbiter* rather than\
  \ a technical reviewer, the implicit product specification has crossed from the\
  \ automotive register into the heritage-stewardship register. That framing is, from\
  \ this cohort's vantage, the most observable feature of the launch.\n\nThe artifact\
  \ frames the Luce, attributively, as \"forse l'automobile più discussa degli ultimi\
  \ vent'anni\" and notes a clean bifurcation of the audience into those who read\
  \ it as \"una svolta coraggiosa e lungimirante\" and those who read it as \"un tradimento\
  \ dell'identità più profonda del Cavallino Rampante.\" That binary is itself a clue\
  \ to the implicit spec: as visible to this cohort, the Luce appears to have been\
  \ specified for *productive controversy* — a vehicle whose semiotic break with the\
  \ expected Ferrari grammar (low, taut, aggressive, sports-architectural) is sufficiently\
  \ sharp that even sympathetic Italian commentators must justify rather than simply\
  \ describe it. Giugiaro's quoted observation that \"la maggioranza della gente ha\
  \ un'aspettativa normale, abituata a vedere le Ferrari, vede questa vettura e rimane\
  \ perplessa\" is, in implicit-spec terms, an acknowledgment that the codice visivo\
  \ Ferrari has been intentionally — and the cohort would infer, knowingly — disrupted.\n\
  \nA second observable spec feature, inferred from the artifact's framing, is the\
  \ *segment shift*: a \"berlina elettrica\" rather than a mid- or front-engined sports\
  \ coupé. From the Italian-press vantage this triggers two parallel readings. The\
  \ motoring press (Quattroruote, Automoto, Gazzetta dello Sport's motori desk) reads\
  \ it through the lens of brand-grammar continuity, where a four-door electric sedan\
  \ is a categorical departure requiring justification on functional grounds — and\
  \ Giugiaro's invocation of \"funzionalità come valore supremo\" can be read as supplying\
  \ exactly that justification. The financial press (Il Sole 24 Ore) and the wires\
  \ (ANSA) would, on the basis of the same artifact set, more plausibly read the spec\
  \ as a hedged-portfolio play: a product engineered for a different customer cohort\
  \ than the historical Ferrari client, executed cautiously enough to preserve the\
  \ existing ICE and hybrid franchise.\n\nA third spec feature visible to this cohort\
  \ is the *heritage-narrative scaffolding*. The decision to seat the launch's interpretation\
  \ through Giugiaro — explicitly catalogued in the artifact via the Golf, Panda,\
  \ DeLorean, Esprit references — places the Luce inside the Italian design-industrial\
  \ pantheon rather than inside the narrower Ferrari-customer conversation. As visible\
  \ to this cohort, the implicit communications spec appears to recruit Italian design\
  \ authority to absorb the legitimacy risk of the formal break.\n\n## Scoring block\n\
