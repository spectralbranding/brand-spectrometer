  \ superfici tese, profili bassi e muscolosi\" — in favour of a berlina elettrica\
  \ form. Giugiaro's attributed quote that \"tutti si aspettano quella forma architettonica\
  \ molto sportiva, molto aggressiva [...] vede questa vettura e rimane perplessa\"\
  \ indicates, from the observer side, that the brand has elected to absorb a perplexity\
