  \ the editorial apparatus assembled around it. The cohort, as visible here, does\
  \ not approach the Luce as a vehicle to be road-tested on conventional motoring\
  \ criteria (powertrain, handling, range). Instead, it frames the object — and the\
  \ word *oggetto* is used \"nel senso più nobile del termine\" — as a cultural-industrial\
  \ event requiring elevated interpretive authority. The choice of Giorgetto Giugiaro\
  \ as interlocutor is itself a Tier-4 signal: when a domestic outlet routes Ferrari\
  \ discourse through the designer of the Golf, the Panda and the Delorean, the implicit\
  \ spec being inferred is one of *patrimonio nazionale under negotiation*, not consumer-product\
  \ launch. The Italian press, as observable here, appears to be performing a national\
  \ stewardship function — adjudicating whether the Cavallino has honoured or betrayed\
  \ its inherited semiotic code.\n\nThe artifact's framing — \"spaccato il mondo dell'automotive\
  \ in due fazioni nette\" — is itself a reconstructed Tier-4 reading: the launch\
  \ is inferred, from this cohort's vantage, to have been designed (or at minimum\
  \ accepted) as polarising. The implicit product spec, as visible to the cohort,\
