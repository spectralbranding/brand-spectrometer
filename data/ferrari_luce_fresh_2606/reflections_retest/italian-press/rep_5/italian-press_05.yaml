  \ 24 Ore, Quattroruote and ANSA.\n\nWhat is observable, even from this single excerpt,\
  \ is a tonal register that domestic-press readers will recognise: the piece personalises\
  \ the controversy around the CEO (\"Pagherà per tutti l'amministratore delegato\
  \ Benedetto Vigna?\"), treats the Borsa reaction as a quasi-civic event (\"il titolo\
  \ in Borsa dopo una violenta flessione ha ripreso a prendere quota\"), and frames\
  \ the design critique through a culturally resonant insult — \"sembra una Toyota\"\
  \ — that, as visible to this cohort, encodes anxiety about loss of Italianità rather\
  \ than a neutral comparative assessment. The implicit Tier-4 spec being inferred\
  \ from the outside is therefore one in which the Luce must simultaneously satisfy\
  \ a global EV-luxury brief and act as a vessel for national-heritage continuity;\
  \ the artifact suggests the cohort reads the second clause as currently under-delivered.\n\
  \nThe excerpt also signals, attributively, that the technical content of the launch\
