  \ a deliberate Tier-4 choice rather than an oversight. Quattroruote-adjacent framing\
  \ typically reads such choices as either courageous or self-harming; in the excerpt,\
  \ both readings co-exist.\n\nWhat the cohort does *not* yet resolve — and what widens\
