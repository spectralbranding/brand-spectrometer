  \ Ferrari is observed simultaneously as a Piazza Affari blue-chip, a Maranello employer\
  \ with regional-economy implications, a Formula 1 standard-bearer, and what could\
  \ reasonably be described as patrimonio nazionale. The Luce launch is therefore\
