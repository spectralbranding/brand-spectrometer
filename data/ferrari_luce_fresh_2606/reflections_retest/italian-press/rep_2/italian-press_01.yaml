rendering: "# Implicit-Spec Inference: Luce Launch as Read by the Italian-Language\
  \ Press Cohort\n\n## Analytical narrative\n\nFrom the vantage of the Italian-language\
  \ press — where Ferrari is treated as national-heritage cultural property as much\
  \ as a listed industrial — the implicit Tier-4 product specification of Luce, as\
