  \ financial-press / cultural-press seam that the cohort itself seems aware of and\
  \ is actively narrating.\n\nThe Milano Finanza excerpt (italian-press_01) frames\
  \ the launch through a financial-market lens but explicitly resists the most dramatic\
  \ reading. The piece notes a ~8% single-session drawdown and roughly €5bn in evaporated\
  \ market capitalisation, but characterises this — citing sell-side notes from Barclays,\
  \ Citi, and Banca Akros — as \"una reazione emotiva degli investitori\" rather than\
  \ evidence of structural mythos damage. The implicit-spec inference visible to this\
  \ cohort is therefore not \"Ferrari has mis-specified its first BEV\" but rather\
  \ \"Ferrari appears to have specified Luce as a deliberately non-reassuring object,\
  \ and the market is in the process of repricing that deliberateness.\" The Milano\
  \ Finanza phrasing — \"Molto probabilmente Ferrari sapeva che questo sarebbe successo.\
  \ La Luce non è progettata per rassicurare il ferrarista classico\" — is, in observer-side\
  \ structural-decomposition terms, the cohort attributing to Maranello an intentional\
  \ spec choice to break continuity with the SF90 / 296 design grammar rather than\
  \ execute an electric translation of it.\n\nThe cultural-political register, surfaced\
  \ through the cited reactions of Luca Cordero di Montezemolo and Carlo Calenda,\
  \ supplies a second axis of inference. From the domestic vantage, criticism by a\
  \ former Ferrari president and a sitting political figure functions as more than\
  \ design commentary: it is, as visible to this cohort, a heritage-custodianship\
  \ dispute about whether the marque's symbolic standing — a quasi-public Italian\
  \ asset — has been ceded to a global EV aesthetic. The cohort does not, in the available\
  \ excerpts, take a side; it stages the dispute. This staging is itself diagnostic\
  \ of how this cohort reads the implicit spec: Luce appears, from the artifacts,\
  \ to have been launched with the symbolic-risk envelope priced in by Maranello but\
  \ not pre-negotiated with domestic heritage stakeholders.\n\nThe financial press's\
  \ reframing — that the question is not aesthetic acceptance but whether \"Ferrari\
  \ è riuscita a costruire un ponte verso il futuro senza compromettere il proprio\
  \ business storico\" — is the clearest articulation in the excerpt of the cohort's\
  \ implicit Tier-4 reading. It suggests, inferred from observable artifacts, a product\
  \ specification in which Luce is positioned as a portfolio-bridging artifact rather\
  \ than a volume vehicle: a discontinuity sized to be absorbed by the existing ICE/hybrid\
  \ backlog rather than to immediately replace it. The Barclays characterisation (\"\
  una delle Ferrari più controverse mai realizzate\") and the Banca Akros \"dalla\
  \ perplessità alla delusione\" gradient suggest the cohort sees the spec as having\
