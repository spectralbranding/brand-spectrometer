  \ Cohort internal divergence\n\nThe Italian-language press cohort, even on the basis\
  \ of this single excerpt, is internally divided in a way the CIs above try to honour.\
  \ Vaielettrico itself oscillates between relaying the harshest social-media verdicts\
  \ and pulling back to remind readers that no full press drives have occurred and\
  \ that the financials remain healthy. This oscillation — characteristic of how Corriere,\
  \ Gazzetta, Il Sole 24 Ore, Quattroruote, and ANSA typically split the labour between\
  \ front-page reputational framing and back-section technical adjudication — is the\
  \ reason most dimensions above carry CIs of roughly four to five points. The cohort\
  \ is, in effect, two cohorts in one: a cultural-commentary register that reads Luce\
  \ as a heritage rupture, and a financial/technical register that reads it as a bounded\
  \ commercial event awaiting empirical confirmation. Until the sampled set includes\
