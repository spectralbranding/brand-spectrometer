  \ expansion-market brief. The “not made ‘for us’” phrasing is especially important\
  \ because it suggests that at least some vocal owners are not only evaluating the\
  \ vehicle as unattractive or unfamiliar, but are interpreting the launch as a **cohort-boundary\
  \ signal**: the product is seen as addressing someone else. In structural-decomposition\
