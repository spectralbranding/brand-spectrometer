  \ owners / vocal owner-forum participants and quoted collectors  \n**Method:** observer-side\
  \ **implicit-spec inference** via **structural decomposition** of the supplied public\
  \ artifact excerpt only.\n\nFrom the actual-owner cohort’s vantage, the Luce launch\
