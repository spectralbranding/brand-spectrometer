  \ enough brand legitimacy and purchase salience to be useful as a gesture, even\
  \ if some owners may not treat delivery or use as central.\n\nThe cohort also appears\
  \ to read the launch through a trust-but-watchful lens. The Lusso anecdote implies\
  \ that prior allocation practices remain salient in owner memory. If owners believe\
  \ dealers may reward broad model support, they may rationally evaluate the Luce\
