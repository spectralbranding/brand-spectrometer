  \ connected to future access to limited hypercars. That reading is especially salient\
  \ for verified or self-identified owners because the artifact foregrounds Ferrari’s\
  \ curated access system rather than the car’s engineering details.\n\nFrom this\
  \ cohort’s vantage, the artifact implies a product whose desirability may be perceived\
