  \ established emotional grammar of Ferrari ownership.\n\nThe most salient inferred\
  \ spec element is target-customer displacement. The phrase “not made ‘for us’” is\
  \ not simply a complaint about styling; as a cohort-side artifact, it implies that\
  \ some verified or self-identified owners are reading the launch as failing an incumbent-owner\
  \ recognition test. In this reading, the Luce’s implied customer is not the long-standing\
  \ Ferrari collector or repeat buyer who expects continuity with prior Ferrari codes,\
  \ but an externally oriented luxury-performance buyer, possibly one associated with\
  \ China-facing demand. This inference should not be treated as evidence of Ferrari’s\
  \ private targeting intent; it is only the owner cohort’s observer-side interpretation\
  \ of publicly visible signals.\n\nA second inferred element is aesthetic and taste\
