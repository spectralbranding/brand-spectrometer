  \ be reconstructed as asking owners to pay supercar-level money for a product whose\
  \ publicly visible differentiators are not being recognized as Ferrari-coded. The\
  \ article’s assertion that Instagram comments included “not a single positive response”\
  \ intensifies this inference, though it should be treated as artifact-mediated rather\
  \ than an independently audited count.\n\nFinally, the launch-confidence signal\
