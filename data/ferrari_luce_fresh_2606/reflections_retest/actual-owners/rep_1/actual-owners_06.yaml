rendering: "### Cohort-indexed implicit-spec inference  \n**Method:** implicit-spec\
  \ inference via structural decomposition of publicly observable owner-cohort artifacts\
  \ only.  \n**Cohort:** actual Ferrari owners / self-identified collectors in public\
  \ owner forums and owner quotations, with a vocal-owner sampling bias.\n\nFrom the\
