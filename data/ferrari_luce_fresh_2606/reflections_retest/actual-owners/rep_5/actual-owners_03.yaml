  \ evaluating product substance, it may make the value proposition seem fragile if\
  \ the car’s desirability is perceived as being propped up by future-access incentives\
  \ rather than by its own design, sound, performance, or collectability.\n\nTechnically,\
  \ the artifact gives almost no owner-visible performance proof. It identifies the\
