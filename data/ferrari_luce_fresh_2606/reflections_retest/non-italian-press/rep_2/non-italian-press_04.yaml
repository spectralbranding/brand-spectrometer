  \ and predictability.” In structural-decomposition terms, the inferred product spec\
  \ appears to include a stronger market-legibility requirement than prior Ferrari\
  \ product mythology is perceived to have required.\n\nDesign, as visible through\
  \ the excerpt, is read as the major failure point or at least the main point of\
  \ contested meaning. The artifact reports memes comparing the Luce to “cordless\
