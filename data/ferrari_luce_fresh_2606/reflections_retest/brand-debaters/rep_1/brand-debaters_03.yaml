  \ sentiment on Reddit/X must therefore be made indirectly, through the column's\
  \ framing of what it is arguing against. Where the cohort is internally split, CIs\
  \ are widened accordingly.\n\nThe cohort also surfaces inferences that exceed Tier-4\
