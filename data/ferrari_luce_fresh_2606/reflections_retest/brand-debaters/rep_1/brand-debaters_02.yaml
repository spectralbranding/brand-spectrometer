  \ — and inference about engineering-tier specs from this cohort would be weakly\
  \ supported.\n\nThe implicit Tier-4 spec, as reconstructed by this cohort from these\
  \ artifacts, plausibly reads as: a deliberately taste-segmenting flagship whose\
  \ buyer-targeting is more aggressive than its powertrain choice; a volume-constrained\
