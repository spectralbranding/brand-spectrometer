  \ divergence\n\nThe brand-debaters cohort is structurally bimodal: the \"betrayal\"\
  \ pole reads the Luce as a category-rupture whose implicit spec abandons combustion-engine\
  \ identity, while the \"smart bet\" pole reads it as a portfolio diversification\
  \ whose spec is orthogonal to the V12/V8 lineage and therefore non-threatening.\
  \ The single artifact available here is itself a *meta-commentary* on this split\
  \ rather than a sample from either pole, which is why the cohort_divergence_capture\
