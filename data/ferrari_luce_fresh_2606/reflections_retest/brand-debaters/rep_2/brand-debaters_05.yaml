  \ comparisons to \"the far cheaper Nissan Leaf.\" Debaters appear to read the styling\
  \ and pricing decisions not as accidental missteps but as choices the brand made\
  \ with foreseeable controversy — the involvement of \"Apple veteran Jony Ive\" is\
