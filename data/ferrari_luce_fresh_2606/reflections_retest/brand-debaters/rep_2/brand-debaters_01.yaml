  \ not the Luce's intended audience, for better or worse\" — is the cohort's most\
  \ compact summary of the inferred spec: it is read as a product whose target-user\
  \ definition has been visibly rewritten.\n\nWhat makes this cohort distinct from\
  \ owners is the register of argument. The excerpt presents the Luce as a *case to\
