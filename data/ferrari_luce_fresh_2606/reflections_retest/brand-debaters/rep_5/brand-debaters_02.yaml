  \ terms participants openly dispute. This register is structurally distinct from\
  \ owner-cohort discourse — debaters reason in arguments and counter-arguments, with\
  \ public-facing rhetorical moves (analogies, hypothetical sales math, demographic\
  \ taxonomies) rather than from possession-experience.\n\nA central inferred-spec\
  \ axis, visible through the structural decomposition of the cited posts, is **target-buyer\
  \ redefinition**. The quoted line — \"Who are they designing these cars for? Young\
  \ wealthy tech hipsters who have very very different tastes than we do\" — suggests\
  \ that, as visible to this cohort, the implicit product spec is read as deliberately\
  \ oriented *away* from the existing enthusiast base toward an adjacent (and aspirationally\
  \ larger) affluent-but-younger segment. The use of \"we\" vs. \"they\" marks the\
  \ cohort's perception that the Luce's implicit buyer-profile spec excludes incumbent\
  \ enthusiasts — though whether that exclusion is interpreted as intentional repositioning\
  \ or as accidental drift is itself contested in the thread.\n\nA second inferred\
  \ axis is **commercial-vindication-as-spec**. The \"1,670 Luces ... $1,000,000,000\
  \ in sales\" calculation is a rhetorical move that reframes the implicit spec from\
  \ aesthetic/heritage criteria onto a volume-and-revenue threshold. Debaters who\
  \ deploy this argument appear to be inferring (observer-side) that the launch's\
  \ implicit acceptance criterion is financial throughput rather than enthusiast endorsement\
  \ — and using that inference to argue the launch may be a \"smart bet\" rather than\
  \ a \"betrayal.\" This framing is, by its nature, contested by the cohort members\
  \ who reject revenue-only legitimacy.\n\nA third axis is **risk-by-analogy**: the\
  \ explicit comparison to \"Jaguar's rebrand\" functions as a cohort-level shorthand\
