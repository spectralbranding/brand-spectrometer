    sha256_source: body
    fetch_status: ok
    archive_url_optional: null
    excerpt: 'We need to talk about the Ferrari Luce... ... plus £30k Porsche Cayman
      alternatives and car features you can''t live without Where to begin with the
      Ferrari Luce? Arguably the biggest news story to come out of Maranello this
      side of the millennium, the firm’s first-ever electric car has sent shockwaves
      through the industry. Naturally, it’s been a bitter pill to swallow for anyone
      who considers themselves an enthusiast, as illustrated by the 1,200-plus comments
      that have been left on our story. But a full seven days have passed since the
      car’s unveiling, so we’re kicking off today’s episode of The Gassing Station
      podcast with a mostly calm, mostly level-headed analysis of what Ferrari’s up
      to with the Luce. Yes, that includes unpicking the techy looks styled in collaboration
      with Jony Ive’s LoveFrom design firm, the radical interior and why we’re not
      the Luce’s intended audience, for better or worse. We also pick through some
      of the comments that caught our eye to see how the Luce has landed on these
      here forums (spoiler alert: not brilliantly). So make a brew, because there’s
      a lot to unpack. Given the Luce will cost in excess of £450,000 in the UK, this
      week’s buying challenge should hopefully be a bit more relatable. PrideofAnglia
