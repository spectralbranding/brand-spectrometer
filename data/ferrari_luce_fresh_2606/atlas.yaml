    excerpt: One of the biggest stories in design this week was the launch of the
      Ferrari Luce, the first electric vehicle from the Maranello-based luxury car
      marker. Pope Leo XIV seemed to like it when he was given a tour on Tuesday,
      but many Ferrari enthusiasts were horrified. Social media was soon flooded with
      memes comparing the design to everything from cordless vacuum cleaners to Apple's
      Magic Mouse. Former Ferrari chairman Luca di Montezemolo said the five-seater
      sedan was “risking the destruction of a myth”, while Italy's transport minister
      complained that it “looks like anything but a car from the prancing horse".
      But why is the Ferrari Luce so controversial, does it matter, and what should
      Ferrari do about it? We asked four branding professionals for their expert takes,
      and a recurring theme emerges. Dylan Stuart is Senior Partner, Brand Strategy
      and Global Automotive Industry Expert at the major corporate branding consultancy
      Lippincott. He sees the problem with the Luce being not so much the design of
      the vehicle but how it conceptually changes what Ferrari is about. “Historically,
      Ferraris bypassed logic. They were irrational purchases justified afterwards.
      The Luce reverses that equation. It asks to be understood before it is desired.
      Admired before it is loved. That is a profound shift for a brand built almost
      entirely on emotional instinct.” There's sense in this change from a business
      point of view. Markets reward rationality and predictability. The Luce is controlled,
      defensible. But the reaction to it is a lesson for all brands that change in
      a bid to please investors. “Investors do not simply want Ferrari to become another
      luxury stock,” Dylan says. “They want Ferrari to remain culturally untouchable.
