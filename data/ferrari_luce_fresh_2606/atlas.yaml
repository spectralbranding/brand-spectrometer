    excerpt: 'IT之家 6 月 4 日消息，法拉利首款纯电车型 Luce 发布后，成了全网群嘲的对象。网友纷纷吐槽该车外观，各类 AI 魔改图在网上流传，受舆论影响，法拉利股价甚至出现短时下跌。
      就连法拉利功勋前总裁卢卡 · 迪 · 蒙特泽莫罗也直言，Luce 可能会毁掉这个传奇品牌。此后马自达、日产也针对这款争议满满的电动汽车发表了调侃言论。
      率先发声的是马自达，其发布了一张上世纪 60 年代推出的初代马自达 Luce SS 车型的照片。原来马自达早年停用“Luce”商标、商标到期失效后，法拉利在今年悄悄拿下了该名称的全球商标使用权。虽说马自达现已无权使用这个车名，但初代马自达
      Luce 的颜值明显优于新款法拉利 Luce 是不争的事实。这条帖子点赞最高的评论写道：“马自达在《GTA6》上线前先拿捏了法拉利”，收获超 4500
      个赞。 没过多久，日产爱尔兰分部在社交平台 Instagram 跟进玩梗。法拉利 Luce 亮相后，不少汽车博主就把它和新款日产聆风放在一起对比，陆续放出两款车的同框实拍图。
      日产官方转发了其中一张侧面对比图，配文：“坦白说，我们倍感荣幸。”还补充道：“常言道，模仿是最高级的恭维，多谢法拉利抬举。” 两款车最直观的共同点，是首发配色都采用了黑蓝撞色设计。除此之外，Luce
      的尾门造型、黑色侧裙边也能看出和聆风有相似之处，但客观来讲两款车整体样貌并不算雷同。不过这条调侃帖发布没多久就被日产爱尔兰下架，大概率是运营小编接到了上级的撤稿通知。
      IT之家注意到，目前网上流传的比较搞笑的法拉利 Luce 恶搞图，是一张 AI 合成图，同时嘲笑了 Luce 和苹果 Magic Mouse，因为苹果鼠标充电口位于底部，充电时必须“翻肚皮”。
