      backlash against the Luce says more about our nostalgia bias than it does about
      the car itself. The Luce is not a confused car or a reckless one. It is, by
      almost every measure, a deeply rational one and that is precisely what hurts.
      In a lot of instances Ferrari just had no choice and the company is doing what
      a leader in its position should do at this point in time: lead. This piece covers
      7 crucial factors behind the Luce, but if you have ever loved Ferrari for reasons
      you cannot fully explain, stay with us until the last section. 1. Electrification
      of the car industry The Luce breaks with nearly every tradition that defined
      Ferrari for 77 years, but the world it exists in has also changed as electrification
      is not a trend Ferrari can opt out of. The question was never whether Ferrari
