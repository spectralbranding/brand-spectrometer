    excerpt: 'Skipping The Ferrari Luce Could Cost Collectors The Cars They Really
      Want Ferrari’s first EV may be controversial, but for loyal collectors, saying
      no could make the next dream allocation more difficult. - Ferrari’s EV gamble
      could reveal how far collectors will go to stay inside Maranello’s inner circle.
      - The Luce could be Ferrari’s hardest sell yet: electric, four-door, visually
      divisive and likely exposed to heavy depreciation. - Ferrari officially frames
      allocation in terms of loyalty and long-term relationships, not simply as “buy
      this car to get that one." Ferrari is reportedly using its first electric vehicle,
      the controversial Luce, as a loyalty test for its wealthy customers. The Italian
      manufacturer has long rewarded buyers who keep purchasing regular production
      cars—mainly softer GTs and four-seat models like the California, FF, GTC4Lusso
      and Portofino—and who build a long-term relationship with the company, earning
      access to limited-run cars. These regular production models are often hit with
      heavy depreciation the minute they leave the showroom, and the $640,000 Luce
      will likely not be an exception. It’s not out of the question that it becomes
      the quickest-depreciating Ferrari in the current lineup, since it’s its first
      EV and has stirred controversy with the way it looks, so it makes sense that
      Ferrari will apply the usual tactic to start moving these cars. Gallery: Ferrari
      Luce (2026) Reuters compares Ferrari’s allocation system for more exclusive
      models to an impossible-to-book fancy restaurant. The more often you show up,
