    excerpt: 'I studied car design and this is why the Ferrari Luce just doesn’t look
      right Let’s cut through the outrage and just focus on the car for a second.
      This is the right movement, but the wrong canvas. The Ferrari Luce has certainly
      generated a strong reaction. But now the dust has settled and the outrage is
      dying down, it’s time to decipher just why the Luce looks as it does. Many of
      my journalist colleagues have come into this industry with different background
      specialities, and mine is car design. And from my understanding, this is why
      the Luce looks as it does. For better or worse. To start with, it’s important
      to reiterate that this was not the work of Ferrari’s usual design team in Italy.
      Instead, the company turned to a product design collective called LoveFrom created
      by ex-Apple men Sir Johnny Ive and Marc Newson. Car fans might not recognise
      the names, but these are two creative legends that sit right at the very pinnacle
      of the product design world. But product design is not car design – these are
      two very different vocations, and in this case the fathers of the minimalist
      post-PC product design era were just not the right people to reinterpret Ferrari
      in a futuristic context. This is part of the reason the Ferrari Luce’s interior
      was far more widely accepted. A car’s cabin is a collection of different products
      – both technical and practical – that sit together in a simple ecosystem designed
      around a human being. The stunning detailing, integration of technical interfaces,
      and classical architectural elements such as the seats and consoles, are the
      bread and butter of both of these designers. In my opinion, the Luce’s interior
      is a triumph: a clear and shining example of the sort of thinking that needs
      to be integrated into all car designs, and integrated now. Bu'
