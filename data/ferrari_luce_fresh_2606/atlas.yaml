    excerpt: 快科技6月1日消息，法拉利首款纯电动车型Luce正式亮相后，口碑两极分化，遭到大量网友吐槽。 这款新车不仅设计风格不被车迷认可，还致使法拉利股价下跌、市值出现缩水。
      针对外界层出不穷的质疑，法拉利CEO贝内代托・维尼亚做出强硬回应，直言该车434万元的定价符合定位，目前市场订单表现十分亮眼。 此次争议主要围绕外观设计和售价展开。
      Luce作为四门电动跑车，由知名设计工作室 LoveFrom 打造，新车一改法拉利经典的凌厉造型，采用简约柔和的车身线条。 不少车迷认为这款车丢掉了品牌独有的运动气质，辨识度大打折扣。
      该车定价55万欧元(折合人民币约434万元)，偏高的价格也让不少消费者觉得难以接受。 面对诸多负面声音，维尼亚透露，首批1600名意向客户在实车亮相后均决定入手，品牌也已收到部分购车款项，详细订单数据将在二季度财报中对外公布。
      他强调，车辆的外观、内饰与性能均为原创打造，和市面其他电动车不存在相似之处。 在设计问题上，维尼亚解释，极简风格是为优化风阻做出的专业设计，相信大家亲身体验实车后会改变看法。
      他同时表示，Luce只是丰富品牌产品线，法拉利不会放弃燃油车与混动车型，会在坚守传统的同时推进电动化转型。 【本文结束】如需转载请务必注明出处：快科技
