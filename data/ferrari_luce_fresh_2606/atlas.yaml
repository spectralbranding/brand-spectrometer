    archive_url_optional: null
    excerpt: 'Ferrari Reportedly Tells Customers: Buy Our EV Or You’re Off the List
      Ferrari has long mastered the art of engineered scarcity, but its latest dealer-network
      maneuver feels less like luxury curation and more like corporate extortion.
      Reports from inside Maranello’s tight-lipped collector circles reveal that the
      Italian automaker is using its first-ever all-electric model, the $640,000 Luce,
      as a literal bargaining chip. The message to the brand''s clients is clear:
      buy this widely rejected EV, or kiss your chances of owning future hypercars
      goodbye. The strategy highlights just how desperate Ferrari is to shift the
      Luce. When it debuted, the vehicle was universally panned by automotive journalists
      and brand purists alike, who criticized its departure from Ferrari''s performance
      heritage. The backlash wasn''t just critical; it was financial. The profoundly
      negative reception sent shockwaves through the market, causing a sharp, highly
      publicized slump in Ferrari’s stock price as investors questioned the brand''s
      electric trajectory. Yet, instead of going back to the drawing board, Ferrari
      is leveraging its legendary allocation system to force the market''s hand. "It
      is like a restaurant where it is impossible to get a table," says Max Girardo,
      founder of collector-car advisory firm Girardo & Co. "If you go every week,
      eventually they find you one. With Ferrari, the more you buy, the more you are
      treated as an important client." The Allocation Trap Ferrari doesn''t use standard
      waiting lists. Instead, Maranello directly curates who is allowed to buy its
      top-tier machinery. To even get a nod for limited-run models, clients must spend
      millions building a curated ownership history, attend factory-sanctioned events,
      and agree not to flip their cars for a quick profit. According to c'
