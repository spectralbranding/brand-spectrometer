      design agency (LoveFrom / Jony Ive) rather than traditional in-house Centro
      Stile, fundamentally altering the vehicle''s aesthetic generation process (chinese-cohort_03,
      chinese-cohort_05, chinese-cohort_07).'
    - '*Platform Architecture Shift:* The transition to a 2.2-ton, four-door, 5026mm
      GT architecture, indicating a fundamental re-engineering of the chassis to accommodate
      a 122 kWh battery pack and four-motor layout, departing from traditional mid-engine
      lightweight platforms (chinese-cohort_03, chinese-cohort_06).'
    - '*Product Lifecycle Alignment:* The cohort infers a coupling with consumer-electronics
      lifecycles (3-5 year update cycles, software-defined iterations), contrasting
      sharply with traditional 10-year automotive development and production cycles
      (chinese-cohort_06).'
