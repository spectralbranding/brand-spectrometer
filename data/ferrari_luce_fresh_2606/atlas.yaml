      nette: chi la celebra come una svolta coraggiosa e lungimirante, e chi la ritiene
      un tradimento dell''identità più profonda del Cavallino Rampante. Per capire
      davvero cosa rappresenta questo oggetto — perché di oggetto si tratta, nel senso
      più nobile del termine — abbiamo incontrato Giorgetto Giugiaro, il designer
      automobilistico più influente della storia, l''uomo che ha dato forma alla Golf,
      alla Panda, alla Delorean, all''Esprite e a centinaia di altre automobili che
      hanno cambiato il corso dell''industria. Il maestro non si è sottratto al giudizio,
      né ha usato mezze misure. Con la consueta lucidità e quella rara capacità di
      leggere i fenomeni culturali oltre la superficie del metallo e della plastica,
      Giugiaro ha offerto una lettura della Ferrari Luce che va ben oltre il semplice
      pollice su o pollice giù. È una riflessione sull''identità dei brand, sul coraggio
      industriale, sulla funzionalità come valore supremo e sul ruolo dell''automobile
      nella società contemporanea. Quando si parla di Ferrari, il cervello di chi
      ama le automobili attiva automaticamente un codice visivo ben preciso: linee
      aggressive, superfici tese, profili bassi e muscolosi, una silhouette che comunica
      velocità anche da ferma. La Luce rompe questo codice in modo radicale, e Giugiaro
      è il primo a riconoscerlo senza per questo condannare la scelta. "Ha sorpreso
      un po'' tutti perché tutti si aspettano quella forma architettonica molto sportiva,
      molto aggressiva", ammette il maestro, "con un contesto ovviamente di grande
      tecnologia. La maggioranza della gente ha un''aspettativa normale, abituata
      a vedere le Ferrari, vede questa vettura e rimane perplessa." Ma'
