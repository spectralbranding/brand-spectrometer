    excerpt: 'La Ferrari elettrica doveva essere uno spartiacque. Lo è stata, ma forse
      non nel modo in cui né la casa di Maranello né il mercato si aspettavano. La
      presentazione di Luce, prima Bev della storia del Cavallino, ha provocato uno
      dei sell-off più violenti degli ultimi anni sul titolo Ferrari a Piazza Affari:
      -8% in una sola seduta, facendo evaporare circa 5 miliardi di capitalizzazione,
      insieme a una raffica di reazioni social negative e commenti con parole molto,
      forse troppo, dure da parte di ex ferraristi come Luca Cordero di Montezemolo,
      che ne è stato presidente, e Carlo Calenda. Eppure, a leggere con attenzione
      i report pubblicati nei giorni successivi al debutto romano della Ferrari Luce,
      il quadro è molto meno drammatico di quanto raccontato dalla reazione immediata
      del mercato. Anzi, per molti broker il crollo di martedì 26 è più il frutto
      di una reazione emotiva degli investitori che il segno di un vero deterioramento
      del mito Ferrari. Perché la vera questione non è se la Luce sia «bella» o «brutta».
      Né se piaccia o meno ai puristi del motore termico e del suo rombo. La domanda
      è un’altra: Ferrari è riuscita a costruire un ponte verso il futuro senza compromettere
      il proprio business storico? Il giudizio sul design della Luce è stato in generale
      negativo. Barclays l’ha definita «una delle Ferrari più controverse mai realizzate».
      Citi parla di «reazioni contrastanti» mentre Banca Akros sottolinea come i primi
      feedback siano andati «dalla perplessità alla delusione». Anche gli analisti
      più ottimisti ammettono che l’estetica della vettura può aver scioccato parte
      della clientela tradizionale. Molto probabilmente Ferrari sapeva che questo
      sarebbe successo. La Luce non è progettata per rassicurare il ferrarista classico.
      Non è una SF90 elettrica né una 296 senza moto'
