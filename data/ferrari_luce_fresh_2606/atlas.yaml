    - '*Investor Confidence:* Observable short-term stock price drops and market capitalization
      shrinkage immediately following the vehicle''s reveal, reflecting market anxiety
      over the design and pricing reception (chinese-cohort_01, chinese-cohort_04,
      chinese-cohort_06).'
    - '*Corporate Governance Divergence:* Public friction between current CEO Benedetto
      Vigna (defending the EV strategy and pricing) and former CEO Luca di Montezemolo
      (warning of brand destruction), signaling internal strategic misalignment visible
      to external observers (chinese-cohort_03, chinese-cohort_04).'
