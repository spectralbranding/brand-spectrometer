    excerpt: 法拉利首款纯电动车型Luce正式发布后，在全球范围内引发广泛讨论。舆论焦点主要集中于其设计风格与品牌传统之间的差异，部分消费者认为该车外观偏离了法拉利一贯的视觉基因，市场反应亦出现波动，公司股价一度下挫百分之八点八。
      近日，法拉利首席执行官贝内代托·维尼亚在摩德纳出席一场品牌活动时，就外界质疑作出明确回应。他表示，Luce定价五十五万欧元，约合人民币四百三十四万元，这一价格充分体现了其在技术、材料与设计理念上的突破性投入，属于合理区间。目前，客户对该车型展现出高度热情，尤其吸引了一批此前未曾接触过法拉利的新用户。已有首批一千六百名潜在买家在实地观车后表达了明确购买意向，并完成银行预付款操作。最终订单数量将在第二季度财务报告中正式披露。
      此次争议的核心在于Luce的造型语言。作为一款四门电动高性能车型，其外观由苹果前首席设计官乔尼·艾夫创立的设计机构LoveFrom主导开发。新车彻底突破法拉利过往以双座、长车头、短车尾为特征的经典比例结构，转向更强调功能性与现代感的布局。不少长期关注品牌的用户指出，新车削弱了法拉利所特有的运动张力与情感联结，视觉辨识度相较以往明显降低，甚至被类比为其他主流电动车型。
      对此，维尼亚强调，Luce在整车设计、座舱体验及动力性能等方面均具备独立原创性，不存在对任何现有电动车型的模仿或借鉴。他进一步说明，该车并非取代传统产品线，而是作为全新细分领域的战略延伸，旨在拓展品牌覆盖人群。法拉利将持续研发并销售高性能燃油动力车型及混合动力车型，三类动力形式将长期共存。
      然而，这一战略方向并未获得业内一致认同。前任首席执行官卢卡·迪·蒙特泽莫罗公开表示，Luce的推出可能稀释法拉利历经数十年积淀而成的品牌精神与历史价值，进而影响其在高端汽车领域的独特地位。观点分歧由此显现，反映出传统豪华性能品牌在电动化转型过程中所面临的深层挑战。
      本文属于原创文章，如若转载，请注明来源：法拉利纯电新车Luce引发争议：设计革新与品牌传承之争https://auto.zol.com.cn/1191/11914999.html
  - artifact_id: chinese-cohort_05
    url: https://chejiahao.m.autohome.com.cn/info/25567873
